<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dreckboss | Mentoria</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
        }

        #matrix {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 1;
        }

        /* Cabeçalho */
        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(0, 0, 0, 0.85);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid #ff9d00;
            box-shadow: 0 0 20px rgba(255, 157, 0, 0.4);
        }

        .profile-img {
            width: 75px;
            height: 75px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid #ff9d00;
        }

        .username {
            font-size: 20px;
            font-weight: bold;
            color: #ff9d00;
        }

        .role-tag {
            background-color: #0a1b3f;
            color: #ffffff;
            text-align: center;
            font-weight: bold;
            font-size: 13px;
            padding: 12px;
            border-radius: 8px;
            text-transform: uppercase;
            border: 1px solid #1a3675;
        }

        /* Animações */
        @keyframes glowing {
            0% { transform: scale(1); box-shadow: 0 0 5px rgba(255, 157, 0, 0.4); }
            50% { transform: scale(1.02); box-shadow: 0 0 20px rgba(255, 157, 0, 0.7); }
            100% { transform: scale(1); box-shadow: 0 0 5px rgba(255, 157, 0, 0.4); }
        }

        .links-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: linear-gradient(90deg, #ffb300 0%, #ff6600 100%);
            color: #ffffff;
            text-decoration: none;
            padding: 16px;
            border-radius: 50px;
            font-weight: bold;
            animation: glowing 3s infinite ease-in-out;
            transition: 0.3s;
        }

        .btn-site {
            background: linear-gradient(90deg, #1e3799 0%, #0984e3 100%);
        }

        /* Banner Branco com Texto Dinâmico */
        .banner-white {
            background-color: #ffffff;
            border-radius: 15px;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: #000;
            animation: glowing 4s infinite ease-in-out;
        }

        #dynamic-announcement {
            transition: opacity 0.4s ease-in-out;
        }

        .footer {
            text-align: center;
            font-size: 10px;
            color: #ff9d00;
            margin-top: 20px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div class="container">
        
        <div class="header">
            <img src="https://i.supaimg.com/844ef9be-0ee7-4290-9625-c0631d49ac86/c180182b-f3c2-41d2-bb10-55d84cdd420a.jpg" alt="Dreckboss" class="profile-img">
            <span class="username">@dreckboss</span>
        </div>

        <div class="role-tag">Mentor de Edição e Criação de Sites & Apps</div>

        <div class="links-list">
            <a href="https://cash-mz.lovable.app" target="_blank" class="btn btn-site">
                <i class="fas fa-external-link-alt"></i> ACESSAR CASH-MZ
            </a>
            <a href="https://www.instagram.com/dreckboss?igsh=MTVjeGFxODR5emNt" target="_blank" class="btn">
                <i class="fab fa-instagram"></i> Instagram
            </a>
            <a href="https://t.me/+258841960928" target="_blank" class="btn">
                <i class="fab fa-telegram-plane"></i> Telegram
            </a>
            <a href="https://wa.me/258841960928" target="_blank" class="btn">
                <i class="fab fa-whatsapp"></i> WhatsApp
            </a>
        </div>

        <!-- Banner Inferior com as frases mudando aqui embaixo -->
        <a href="https://wa.me/258841960928" class="banner-white">
            <div style="display: flex; align-items: center; gap: 12px;">
                <div style="background:#ff9d00; color:white; width:40px; height:40px; display:flex; align-items:center; justify-content:center; border-radius:8px;">
                    <i class="fas fa-bullhorn"></i>
                </div>
                <div>
                    <span style="font-size: 11px; font-weight: bold; color: #666; display: block;">Anúncio Especial</span>
                    <span id="dynamic-announcement" style="font-size: 15px; font-weight: 900; color: #ff3300; display: block;">VAGAS LIMITADAS 🔥</span>
                </div>
            </div>
            <i class="fas fa-chevron-right" style="color: #ff9d00;"></i>
        </a>

        <div class="footer">MATRIX SYSTEM BY DRECKBOSS</div>

    </div>

    <script>
        /* Matrix Effect */
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const alphabet = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ' + 'アァカサタナハマ야';
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const rainDrops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0F0';
            ctx.font = fontSize + 'px monospace';
            for(let i = 0; i < rainDrops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i*fontSize, rainDrops[i]*fontSize);
                if(rainDrops[i]*fontSize > canvas.height && Math.random() > 0.975) rainDrops[i] = 0;
                rainDrops[i]++;
            }
        }
        setInterval(drawMatrix, 30);

        /* Frases do Anúncio Inferior */
        const ads = [
            "VAGAS LIMITADAS 🔥",
            "MENTORIA EXCLUSIVA 🚀",
            "APRENDA COM O DRECK 🎬",
            "SITES & APPS DO ZERO 📱",
            "CHAMA NO WHATSAPP! 💬"
        ];
        let adCount = 0;
        const adElement = document.getElementById("dynamic-announcement");

        function rotateAds() {
            adElement.style.opacity = 0;
            setTimeout(() => {
                adCount = (adCount + 1) % ads.length;
                adElement.innerText = ads[adCount];
                adElement.style.opacity = 1;
            }, 400);
        }
        setInterval(rotateAds, 2500); // Muda a frase a cada 2.5 segundos
    </script>
</body>
</html>
